const _sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ── upsert helper ──────────────────────────────────────────────────────────
async function _upsert(table, id_col, id_val, data) {
  await _sb.from(table).upsert({ [id_col]: id_val, data: data }, { onConflict: id_col });
}

// ── fetch all rows as {id: data} map ──────────────────────────────────────
async function _fetchAll(table, id_col) {
  const { data, error } = await _sb.from(table).select("*");
  if (error || !data) return {};
  return Object.fromEntries(data.map(r => [r[id_col], r.data]));
}

// ── Realtime channel subscriptions ────────────────────────────────────────
const _channels = {};

function _listenTable(table, id_col, cb) {
  _fetchAll(table, id_col).then(cb);
  const channel = _sb.channel(`public:${table}`)
    .on("postgres_changes", { event: "*", schema: "public", table }, async () => {
      const fresh = await _fetchAll(table, id_col);
      cb(fresh);
    })
    .subscribe();
  _channels[table] = channel;
}

  },

  getAgents: async () => {
    const { data } = await _sb.from("iebc_config").select("value").eq("key", "agents").limit(1);
    return (data && data.length > 0) ? JSON.parse(data[0].value) : null;
  },
  setAgents: async (agents) => {
    await _sb.from("iebc_config").upsert({ key: "agents", value: JSON.stringify(agents) }, { onConflict: "key" });
  },

  getCoordinators: async () => {
    const { data } = await _sb.from("iebc_config").select("value").eq("key", "coordinators").limit(1);
    return (data && data.length > 0) ? JSON.parse(data[0].value) : null;
  },
  setCoordinators: async (coords) => {
    await _sb.from("iebc_config").upsert({ key: "coordinators", value: JSON.stringify(coords) }, { onConflict: "key" });
  },

  listenConnection: (cb) => {
    cb(navigator.onLine);
    window.addEventListener("online",  () => cb(true));
    window.addEventListener("offline", () => cb(false));
  },

  off: (table) => {
    const ch = _channels[table] || _channels[`iebc_${table}`];
    if (ch) _sb.removeChannel(ch);
  },
};

// CSV EXPORT HELPERS
// ═══════════════════════════════════════════════════════════════════════════════
function csvEscape(val) {
  const s = String(val ?? "");
  if (/[",\n]/.test(s)) return `"${s.replace(/"/g, '""')}"`;
  return s;
}
function downloadCSV(filename, rows) {
  const csv = rows.map((row) => row.map(csvEscape).join(",")).join("\r\n");
  const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url;
  link.setAttribute("download", filename);
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);
}

// ═══════════════════════════════════════════════════════════════════════════════
// GEO UTILITIES — Haversine distance, location check
// ═══════════════════════════════════════════════════════════════════════════════
function haversineKm(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function checkUploadLocation(userLat, userLng, station) {
  // Distance from assigned polling station
  const distStation = (station?.lat && station?.lng)
    ? haversineKm(userLat, userLng, station.lat, station.lng)
    : null;
  // Distance from tally centre
  const distTally = TALLY_CENTRE
    ? haversineKm(userLat, userLng, TALLY_CENTRE.lat, TALLY_CENTRE.lng)
    : null;

  const withinStation = distStation !== null && distStation <= (GEO_CONFIG?.station_radius_km || 1.0);
  const withinTally   = distTally !== null   && distTally   <= (GEO_CONFIG?.tally_centre_radius_km || 1.0);
  const isWithin = withinStation || withinTally;

  return {
    userLat, userLng,
    distStation: distStation !== null ? Math.round(distStation * 1000) : null, // metres
    distTally:   distTally   !== null ? Math.round(distTally   * 1000) : null,
    withinStation, withinTally,
    isWithin,
    locationLabel: withinStation ? "Within Polling Station" : withinTally ? "Within Tally Centre" : "Outside Authorised Zone",
  };
}

function exportWardCSV(ward, results) {
  const stations = POLLING_STATIONS.filter((s) => s.ward === ward);
  const header = ["Ward", "Station Code", "Station Name", "Registered Voters", "Votes Cast", "Rejected", "Disputed",
    ...CANDIDATES.map((c) => c.name), "Valid Votes Total", "AI Verified", "Mismatch Flags", "Status", "Submitted At"];
  const rows = [header];
  const totals = { registered: 0, cast: 0, rejected: 0, disputed: 0, candidates: {} };
  CANDIDATES.forEach((c) => totals.candidates[c.id] = 0);

  stations.forEach((s) => {
    const r = results[s.id];
    const v = db.verifications[s.id];
    const candVotes = CANDIDATES.map((c) => parseInt(r?.votes?.[c.id]) || 0);
    const validTotal = candVotes.reduce((a, b) => a + b, 0);
    if (r) {
      totals.registered += parseInt(r.registered) || 0;
      totals.cast += parseInt(r.cast) || 0;
      totals.rejected += parseInt(r.rejected) || 0;
      totals.disputed += parseInt(r.disputed) || 0;
      CANDIDATES.forEach((c, i) => totals.candidates[c.id] += candVotes[i]);
    }
    const aiVerified = v ? (v.hasMismatch ? "MISMATCH" : "MATCH") : "Not verified";
    const mismatchFlags = v?.mismatches?.map(m => m.field).join("; ") || "";
    rows.push([ward, s.code, s.label,
      r?.registered ?? "", r?.cast ?? "", r?.rejected ?? "0", r?.disputed ?? "0",
      ...candVotes, validTotal, aiVerified, mismatchFlags,
      r ? "Submitted" : "Pending",
      r ? new Date(r.submittedAt).toLocaleString("en-KE") : "",
    ]);
  });

  const candTotalCols = CANDIDATES.map((c) => totals.candidates[c.id]);
  const validGrandTotal = candTotalCols.reduce((a, b) => a + b, 0);
  rows.push([ward, "TOTAL", `${stations.filter(s => results[s.id]).length}/${stations.length} stations reported`,
    totals.registered, totals.cast, totals.rejected, totals.disputed,
    ...candTotalCols, validGrandTotal, "", "", "", ""]);

  downloadCSV(`Tally_${ward.replace(/\s+/g, "_")}.csv`, rows);
}

function exportConstituencyCSV(results) {

    stations.forEach((s) => {

      const validTotal = candVotes.reduce((a, b) => a + b, 0);
      if (r) {
        submittedCount++;
        wardTotals.registered += parseInt(r.registered) || 0;

        wardTotals.rejected += parseInt(r.rejected) || 0;

  rows.push(["CONSTITUENCY", "GRAND TOTAL", `${submittedCount}/130 stations reported`,

// ═══════════════════════════════════════════════════════════════════════════════
// AI FORM VERIFICATION — calls Claude Vision API
// ═══════════════════════════════════════════════════════════════════════════════
async function verifyFormWithAI(imageBase64, mediaType, submittedData, station) {
  const systemPrompt = `You are an election results verification assistant for IEBC Kenya. 
A polling agent has submitted digital results AND uploaded a photo of the physical IEBC Form 35A (Results Declaration Form).
Your job is to extract numbers from the physical form image and compare them against the digital submission.

Extract these fields from the physical form image:
- Registered voters
- Total votes cast  
- Rejected ballots
- Disputed ballots
- Votes for each candidate (there are 7 candidates)

Return ONLY a valid JSON object with this exact structure, no markdown:
{
  "extracted": {
    "registered": <number or null if unreadable>,
    "cast": <number or null>,
    "rejected": <number or null>,
    "disputed": <number or null>,
    "candidates": {
      "1": <number or null>,
      "2": <number or null>,
      "3": <number or null>,
      "4": <number or null>,
      "5": <number or null>,
      "6": <number or null>,
      "7": <number or null>
    }
  },
  "imageQuality": "clear|blurry|partial|unreadable",
  "confidence": "high|medium|low",
  "notes": "<any observations about the form image>"
}`;

  const userPrompt = `Station: ${station.code} — ${station.label} (${station.ward})

Digital submission:
- Registered voters: ${submittedData.registered}
- Total votes cast: ${submittedData.cast}
- Rejected ballots: ${submittedData.rejected || 0}
- Disputed ballots: ${submittedData.disputed || 0}
- Candidate votes: ${CANDIDATES.map(c => `${c.name}: ${submittedData.votes?.[c.id] || 0}`).join(", ")}

Please extract figures from the physical form in the image and return the JSON.`;

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 1000,
      messages: [{
        role: "user",
        content: [
          { type: "image", source: { type: "base64", media_type: mediaType, data: imageBase64 } },
          { type: "text", text: userPrompt }
        ]
      }],
      system: systemPrompt
    })
  });

  const data = await response.json();
  const text = data.content?.map(b => b.text || "").join("") || "";

  // Parse JSON from response
  const clean = text.replace(/```json|```/g, "").trim();
  const parsed = JSON.parse(clean);

  // If form type or code check failed (abort signals), return early
  if (!parsed || !parsed.extracted) {
    return { hasMismatch: false, mismatches: [], imageQuality: "error", confidence: "low", verifiedAt: new Date().toISOString(), notes: "Upload rejected due to form validation failure." };
  }

  // Now compare extracted vs submitted
  const mismatches = [];
  const ext = parsed.extracted;

  const numCompare = (field, label, submitted, extracted) => {
    if (extracted !== null && extracted !== undefined) {
      const s = parseInt(submitted) || 0;
      const e = parseInt(extracted) || 0;
      if (s !== e) mismatches.push({ field: label, submitted: s, extracted: e, diff: s - e });
    }
  };

  // SECURITY CHECK 1: Form type (must be Form 35A for MP)
  if (parsed.formTypeError) {
    alert("🚨 WRONG FORM DETECTED!\n\n" + 
      "Form Type Detected: " + (parsed.formType || "Unknown") + "\n\n" +
      "Only IEBC Form 35A for Member of National Assembly (MP) is accepted.\n\n" +
      "You may have uploaded the wrong form. Please upload the correct Form 35A for MP position.\n\n" +
      "This upload has been REJECTED.");
    return null; // abort
  }

  // SECURITY CHECK 2: Polling station code match
  if (parsed.detectedCode) {
    const detected = parsed.detectedCode.replace(/\s/g, "");
    const expected = station.code.replace(/\s/g, "");
    if (detected !== expected) {
      alert("🚨 POLLING STATION CODE MISMATCH!\n\n" +
        "Code on Physical Form: " + detected + "\n" +
        "Expected Code (this station): " + expected + "\n\n" +
        "You may have uploaded the wrong form for this polling station.\n\n" +
        "This upload has been REJECTED to prevent data fraud.");
      return null; // abort
    }
  }

  numCompare("registered", "Registered Voters", submittedData.registered, ext.registered);
  numCompare("cast", "Votes Cast", submittedData.cast, ext.cast);
  numCompare("rejected", "Rejected Ballots", submittedData.rejected || 0, ext.rejected);
  numCompare("disputed", "Disputed Ballots", submittedData.disputed || 0, ext.disputed);
  CANDIDATES.forEach(c => {
    numCompare(`cand_${c.id}`, c.name, submittedData.votes?.[c.id] || 0, ext.candidates?.[String(c.id)]);
  });

  return {
    ...parsed,
    mismatches,
    hasMismatch: mismatches.length > 0,
    verifiedAt: new Date().toISOString()
  };
}

function App() {
  const [session, setSession] = useState(null);
  const [results, setResults] = useState({});
  const [editRequests, setEditRequests] = useState({});
  const [verifications, setVerifications] = useState({});
  const [fbConnected, setFbConnected] = useState(null); // null=checking, true=online, false=offline

  // ── Supabase real-time listeners ────────────────────────────────────────────
  useEffect(() => {
    // Connection status
    FB.listenConnection(online => setFbConnected(online));

    // Live results from Supabase
    FB.listenResults(data => setResults(data));

    // Live verifications
    FB.listenVerifications(data => setVerifications(data));

    // Live edit requests
    FB.listenEditRequests(data => setEditRequests(data));

    return () => {
      FB.off("results");
      FB.off("verifications");
      FB.off("editRequests");
      FB.off(".info/connected");
    };
  }, []);

  // ── Demo seed data (shown in admin for visual reference) ─────────────────
  const [seeded] = useState(() => {
    const demo = {};
    [3, 7, 12, 18, 25, 31, 44, 55, 60, 72, 88, 95, 101, 115, 122, 126, 129].forEach((sid) => {
      const station = POLLING_STATIONS.find(s => s.id === sid);
      const regVoters = station?.registeredVoters || 500;
      const turnoutPct = 0.18 + Math.random() * 0.20;
      const cast = Math.round(regVoters * turnoutPct);
      const rejected = Math.max(1, Math.floor(cast * 0.005));
      const disputed = Math.max(0, Math.floor(cast * 0.002));
      const validVotes = cast - rejected - disputed;
      const votes = {};
      // Mama Baraka (Independent, last candidate) must always win
      const others = CANDIDATES.slice(0, -1);
      const winner = CANDIDATES[CANDIDATES.length - 1];
      let remaining = validVotes;
      others.forEach((c, i) => {
        // Each other candidate gets 8–15% of valid votes
        const share = Math.floor(validVotes * (0.08 + Math.random() * 0.07));
        const v = Math.max(1, Math.min(share, remaining - (others.length - i)));
        votes[c.id] = String(v);
        remaining -= v;
      });
      // Mama Baraka gets the remainder — guaranteed winner
      votes[winner.id] = String(Math.max(1, remaining));
      const anomaly = DEMO_ANOMALOUS[sid];
      let geo;
      if (anomaly) {
        // This is an anomalous upload — from outside constituency
        const stn = POLLING_STATIONS.find(s => s.id === sid);
        const distStation = stn?.lat ? Math.round(haversineKm(anomaly.lat, anomaly.lng, stn.lat, stn.lng) * 1000) : null;
        const distTally = TALLY_CENTRE ? Math.round(haversineKm(anomaly.lat, anomaly.lng, TALLY_CENTRE.lat, TALLY_CENTRE.lng) * 1000) : null;
        geo = { userLat: anomaly.lat, userLng: anomaly.lng, distStation, distTally, withinStation: false, withinTally: false, isWithin: false, locationLabel: `Outside Authorised Zone — ${anomaly.label}` };
      } else {
        // Normal upload — within station
        const stn = POLLING_STATIONS.find(s => s.id === sid);
        const jLat = (stn?.lat || -1.29) + (Math.random() - 0.5) * 0.002;
        const jLng = (stn?.lng || 37.34) + (Math.random() - 0.5) * 0.002;
        const distStation = stn?.lat ? Math.round(haversineKm(jLat, jLng, stn.lat, stn.lng) * 1000) : 50;
        const distTally = TALLY_CENTRE ? Math.round(haversineKm(jLat, jLng, TALLY_CENTRE.lat, TALLY_CENTRE.lng) * 1000) : null;
        geo = { userLat: jLat, userLng: jLng, distStation, distTally, withinStation: true, withinTally: false, isWithin: true, locationLabel: "Within Polling Station" };
      }
      demo[sid] = { votes, registered: String(regVoters), cast: String(cast), rejected: String(rejected), disputed: String(disputed), agentId: `A${String(sid).padStart(3, "0")}`, agentName: `Agent KW-${String(sid).padStart(3, "0")}`, submittedAt: new Date(Date.now() - Math.random() * 7200000).toISOString(), stationId: sid, _isDemo: true, geo };
    });
    return demo;
  });

  const [seededVerifs] = useState(() => {
    const dv = {};
    const flagStations = [3, 12, 31, 72, 115];
    flagStations.forEach((sid) => {
      const station = POLLING_STATIONS.find(s => s.id === sid);
      const reg = station?.registeredVoters || 500;
      const turnoutPct = 0.18 + Math.random() * 0.20;
      const cast = Math.round(reg * turnoutPct);
      const rejected = Math.max(1, Math.floor(cast * 0.005));
      const disputed = Math.max(0, Math.floor(cast * 0.002));
      const mismatchFields = [
        { field: "Votes Cast", submitted: cast, extracted: cast + Math.floor(Math.random()*12)+3, diff: -(Math.floor(Math.random()*12)+3) },
        { field: "Rejected Ballots", submitted: rejected, extracted: rejected + 2, diff: -2 },
      ];
      dv[sid] = {
        hasMismatch: true, mismatches: mismatchFields,
        imageQuality: ["blurry","partial","clear"][Math.floor(Math.random()*3)],
        confidence: ["medium","low"][Math.floor(Math.random()*2)],
        verifiedAt: new Date(Date.now() - Math.random() * 3600000).toISOString(),
        notes: ["Handwriting unclear on total cast row.", "Form appears partially torn at bottom.", "Ink smudge on candidate 3 row.", "Figures in pencil — difficult to read.", "Alteration visible on rejected ballots row."][flagStations.indexOf(sid)],
        formType: "Form 35A - Member of National Assembly",
        detectedCode: station?.code || null,
        _isDemo: true,
      };
    });
    return dv;
  });

  const [seededEdits] = useState(() => {
    const de = {};
    const corrStations = [7, 18, 44, 60, 88, 101, 126];
    const reasons = [
      "Transcription error on candidate 2 votes — physical form shows 87 not 78.",
      "Rejected ballots counted twice — should be 3 not 6.",
      "Votes cast figure incorrect, re-counted physical tally shows 312.",
      "Candidate 5 votes entered as 0 in error — correct figure is 34.",
      "Handwriting misread: 156 entered as 196 for candidate 1.",
      "Disputed ballots should be 0, was entered as 2 by mistake.",
      "Total cast figure off by 10 — manual recount confirmed 287.",
    ];
    corrStations.forEach((sid, i) => {
      const station = POLLING_STATIONS.find(s => s.id === sid);
      const reg = station?.registeredVoters || 500;
      const original = { registered: String(reg), cast: "300", rejected: "4", disputed: "1", agentId: `A${String(sid).padStart(3,"0")}`, agentName: `Agent KW-${String(sid).padStart(3,"0")}`, stationId: sid };
      const proposed = { ...original, cast: String(parseInt(original.cast) - Math.floor(Math.random()*15)+5) };
      const reqId = `ER-DEMO-${sid}`;
      de[reqId] = {
        id: reqId, stationId: sid, ward: station?.ward || "Kangundo North",
        proposed, original, reason: reasons[i], status: "pending",
        requestedAt: new Date(Date.now() - Math.random() * 7200000).toISOString(),
        requestedBy: original.agentId, _isDemo: true,
      };
    });
    return de;
  });

  // Merge Supabase live data on top of demo seed data
  const allResults      = { ...seeded,      ...results      };
  const allVerifications = { ...seededVerifs, ...verifications };
  const allEditRequests  = { ...seededEdits,  ...editRequests  };

  // ── Data write functions → Supabase ─────────────────────────────────────────
  function handleSubmitResult(stationId, data) {
    const record = { ...data, submittedAt: new Date().toISOString(), stationId };
    FB.setResult(stationId, record); // Supabase realtime updates state automatically
  }

  function handleSaveVerification(stationId, verResult) {
    FB.setVerification(stationId, verResult);
  }

  function handleRequestEdit(stationId, proposedData, reason) {
    const reqId = `ER-${stationId}-${Date.now()}`;
    const station = POLLING_STATIONS.find((s) => s.id === stationId);
    const req = {
      id: reqId, stationId, ward: station?.ward,
      proposed: proposedData, original: allResults[stationId],
      reason: reason || "", status: "pending",
      requestedAt: new Date().toISOString(), requestedBy: proposedData.agentId,
    };
    FB.setEditRequest(reqId, req);
  }

  function handleResolveEdit(reqId, approve, coordinatorName) {
    const req = editRequests[reqId] || seededEdits[reqId];
    if (!req) return;
    const updatedReq = { ...req, status: approve ? "approved" : "rejected", resolvedAt: new Date().toISOString(), resolvedBy: coordinatorName };
    FB.setEditRequest(reqId, updatedReq);
    if (approve) {
      const updatedResult = { ...req.proposed, submittedAt: req.original?.submittedAt || new Date().toISOString(), correctedAt: new Date().toISOString(), stationId: req.stationId };
      FB.setResult(req.stationId, updatedResult);
    }
  }

  // ── Connection status banner ──────────────────────────────────────────────
  const connBanner = fbConnected === false ? (
    <div style={{ position:"fixed", top:0, left:0, right:0, zIndex:9999, background:"#7a1a00", color:"#ffccaa", fontSize:12, fontWeight:700, textAlign:"center", padding:"6px 0", letterSpacing:0.5 }}>
      ⚠️ OFFLINE — Results will sync automatically when connection is restored
    </div>
  ) : fbConnected === true ? null : (
    <div style={{ position:"fixed", top:0, left:0, right:0, zIndex:9999, background:"#0a2a18", color:"#60c080", fontSize:12, fontWeight:700, textAlign:"center", padding:"6px 0" }}>
      🔄 Connecting to Supabase…
    </div>
  );

  if (!session) return <>{connBanner}<LoginScreen onLogin={setSession} /></>;
  if (session.type === "admin")
    return <>{connBanner}<AdminDashboard results={allResults} editRequests={allEditRequests} verifications={allVerifications} onLogout={() => setSession(null)} fbConnected={fbConnected} /></>;
  if (session.type === "coordinator")
    return <>{connBanner}<CoordinatorApp coordinator={session.coordinator} results={allResults} editRequests={allEditRequests} verifications={allVerifications} onResolveEdit={handleResolveEdit} onLogout={() => setSession(null)} /></>;
  return (
    <>{connBanner}
    <AgentApp agent={session.agent} results={allResults} editRequests={allEditRequests} verifications={allVerifications}
      onSubmit={handleSubmitResult} onRequestEdit={handleRequestEdit} onSaveVerification={handleSaveVerification} onLogout={() => setSession(null)} fbConnected={fbConnected} />
    </>
  );
}

// LOGIN
// ═══════════════════════════════════════════════════════════════════════════════
function LoginScreen({ onLogin }) {
  const [mode, setMode] = useState("agent");
  const [agentId, setAgentId] = useState("");
  const [pin, setPin] = useState("");
  const [adminUser, setAdminUser] = useState("");
  const [adminPin, setAdminPin] = useState("");
  const [coordUser, setCoordUser] = useState("");
  const [coordPin, setCoordPin] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);

  function handleAgentLogin() {
    setError(""); setLoading(true);
    setTimeout(() => {
      const agent = AGENTS.find((a) => a.id.toUpperCase() === agentId.toUpperCase().trim() && a.pin === pin.trim());
      if (agent && agent.disabled) { setError("⛔ This agent account has been disabled. Please contact the Ward Coordinator."); setLoading(false); return; }
      if (agent) onLogin({ type: "agent", agent });
      else setError("Agent ID or PIN is incorrect.");
      setLoading(false);
    }, 500);
  }
  function handleAdminLogin() {
    setError(""); setLoading(true);
    setTimeout(() => {
      if (adminUser.trim() === ADMIN.username && adminPin.trim() === ADMIN.pin) onLogin({ type: "admin" });
      else setError("Admin credentials are incorrect.");
      setLoading(false);
    }, 500);
  }
  function handleCoordinatorLogin() {
    setError(""); setLoading(true);
    setTimeout(() => {
      const coordinator = WARD_COORDINATORS.find((c) => c.username.toLowerCase() === coordUser.toLowerCase().trim() && c.pin === coordPin.trim());
      if (coordinator && coordinator.disabled) { setError("⛔ This Ward Coordinator account has been disabled. Please contact Admin."); setLoading(false); return; }
      if (coordinator) onLogin({ type: "coordinator", coordinator });
      else setError("Coordinator username or PIN is incorrect.");
      setLoading(false);
    }, 500);
  }

  return (
    <div style={S.page}>
      <div style={S.loginWrap}>
        <div style={S.loginHeader}>
          <div style={S.badge}>🗳️</div>
          <div style={{ fontSize: 13, letterSpacing: 2, color: "#80c8a0", fontWeight: 700, textTransform: "uppercase", marginBottom: 4 }}>IEBC · Machakos County</div>
          <div style={{ fontSize: 20, fontWeight: 800, color: "#fff" }}>Kangundo Constituency</div>
          <div style={{ fontSize: 15, color: "#90b8a8", marginTop: 2 }}>IEBC MiRRoR · MP Election Results</div>
        </div>
        <div style={S.tabs}>
          {["agent", "coordinator", "admin"].map((m) => (
            <button key={m} onClick={() => { setMode(m); setError(""); }} style={{ ...S.tab, ...(mode === m ? S.tabActive : {}) }}>
              {m === "agent" ? "🧑‍💼 Agent" : m === "coordinator" ? "🧭 Ward Coordinator" : "🔐 Admin"}
            </button>
          ))}
        </div>
        <div style={S.loginCard}>
          {mode === "agent" ? (<>
            <p style={S.hint}>Enter your Agent ID and PIN assigned by the Ward Coordinator.</p>
            <FormField label="Agent ID"><input style={S.input} placeholder="e.g. A001" value={agentId} onChange={(e) => setAgentId(e.target.value)} onKeyDown={(e) => e.key === "Enter" && handleAgentLogin()} /></FormField>
            <FormField label="PIN"><input style={S.input} type="password" placeholder="PIN" value={pin} onChange={(e) => setPin(e.target.value)} onKeyDown={(e) => e.key === "Enter" && handleAgentLogin()} /></FormField>
            {error && <ErrBox>{error}</ErrBox>}
            <PrimaryBtn onClick={handleAgentLogin} loading={loading}>Sign In as Agent</PrimaryBtn>
          </>) : mode === "coordinator" ? (<>
            <p style={S.hint}>Ward Coordinators review and approve correction requests.</p>
            <FormField label="Username"><input style={S.input} placeholder="e.g. wc.kangundonorth" value={coordUser} onChange={(e) => setCoordUser(e.target.value)} onKeyDown={(e) => e.key === "Enter" && handleCoordinatorLogin()} /></FormField>
            <FormField label="PIN"><input style={S.input} type="password" placeholder="PIN" value={coordPin} onChange={(e) => setCoordPin(e.target.value)} onKeyDown={(e) => e.key === "Enter" && handleCoordinatorLogin()} /></FormField>
            {error && <ErrBox>{error}</ErrBox>}
            <PrimaryBtn onClick={handleCoordinatorLogin} loading={loading}>Sign In as Ward Coordinator</PrimaryBtn>
          </>) : (<>
            <p style={S.hint}>Administrator access — view all stations and live results.</p>
            <FormField label="Username"><input style={S.input} placeholder="admin" value={adminUser} onChange={(e) => setAdminUser(e.target.value)} onKeyDown={(e) => e.key === "Enter" && handleAdminLogin()} /></FormField>
            <FormField label="Password"><input style={S.input} type="password" placeholder="Admin PIN" value={adminPin} onChange={(e) => setAdminPin(e.target.value)} onKeyDown={(e) => e.key === "Enter" && handleAdminLogin()} /></FormField>
            {error && <ErrBox>{error}</ErrBox>}
            <PrimaryBtn onClick={handleAdminLogin} loading={loading}>Sign In as Admin</PrimaryBtn>
          </>)}
        </div>
        <div style={{ textAlign: "center", fontSize: 13, color: "#2a4a3a", marginTop: 12 }}>Secure · Timestamped · Agent-locked submissions</div>
      </div>
    </div>
  );
}

// AI FORM VERIFICATION PANEL
// ═══════════════════════════════════════════════════════════════════════════════
function AIVerificationPanel({ station, submittedData, existingVerification, onSaveVerification }) {
  const [uploadedFile, setUploadedFile] = useState(null);
  const [previewUrl, setPreviewUrl] = useState(null);
  const [analyzing, setAnalyzing] = useState(false);
  const [result, setResult] = useState(existingVerification || null);
  const [error, setError] = useState("");
  const fileRef = useRef();

  function handleFileChange(e) {
    const file = e.target.files[0];
    if (!file) return;
    const allowed = ["image/jpeg", "image/png", "image/webp", "image/gif"];
    if (!allowed.includes(file.type)) {
      setError("Please upload an image file (JPG, PNG, WEBP). For PDFs, take a photo of the form first.");
      return;
    }
    setError("");
    setUploadedFile(file);
    setPreviewUrl(URL.createObjectURL(file));
    setResult(null);
  }

  async function handleAnalyze() {
    if (!uploadedFile || !submittedData) return;
    setAnalyzing(true);
    setError("");
    try {
      const base64 = await new Promise((res, rej) => {
        const reader = new FileReader();
        reader.onload = () => res(reader.result.split(",")[1]);
        reader.onerror = () => rej(new Error("File read failed"));
        reader.readAsDataURL(uploadedFile);
      });
      const verResult = await verifyFormWithAI(base64, uploadedFile.type, submittedData, station);
      if (verResult === null) {
        // Security check failed (code mismatch or wrong form type) — abort, alert already shown
        setAnalyzing(false);
        return;
      }
      setResult(verResult);
      if (verResult && verResult.imageQuality !== "error") {
        onSaveVerification(station.id, verResult);
      }
    } catch (err) {
      setError(`AI analysis failed: ${err.message}. Check your connection and try again.`);
    }
    setAnalyzing(false);
  }

  if (!submittedData) {
    return (
      <Card title="📄 AI Form Verification">
        <div style={{ textAlign: "center", padding: "20px 0", color: "#3a5060", fontSize: 13 }}>
          Submit digital results first before uploading the physical form for verification.
        </div>
      </Card>
    );
  }

  return (
    <Card title="📄 AI Form Verification">
      <div style={{ fontSize: 13, color: "#5080a0", marginBottom: 14, lineHeight: 1.6 }}>
        Upload a photo or scan of the physical IEBC Form 35A (Member of National Assembly — MP only). AI will verify the form type, match the polling station code, and flag any differences from what was entered digitally.
      </div>

      {/* Upload area */}
      <div
        onClick={() => fileRef.current?.click()}
        style={{ border: `2px dashed ${uploadedFile ? "#2ec4b6" : "#1a3050"}`, borderRadius: 10, padding: "20px 16px", textAlign: "center", cursor: "pointer", background: "#060e1a", marginBottom: 12, transition: "border-color 0.2s" }}
      >
        {previewUrl ? (
          <div>
            <img src={previewUrl} alt="Form preview" style={{ maxWidth: "100%", maxHeight: 200, borderRadius: 6, objectFit: "contain" }} />
            <div style={{ fontSize: 12, color: "#2ec4b6", marginTop: 8 }}>✅ {uploadedFile?.name} — tap to replace</div>
          </div>
        ) : (
          <div>
            <div style={{ fontSize: 32, marginBottom: 8 }}>📷</div>
            <div style={{ fontSize: 14, color: "#5080a0", fontWeight: 600 }}>Tap to upload Form 35A photo</div>
            <div style={{ fontSize: 11, color: "#ff8040", marginTop: 4, fontWeight: 600 }}>⚠️ MP / Member of National Assembly ONLY</div>
            <div style={{ fontSize: 12, color: "#3a5060", marginTop: 4 }}>JPG, PNG, or WEBP · Take a clear, well-lit photo</div>
          </div>
        )}
        <input ref={fileRef} type="file" accept="image/jpeg,image/png,image/webp,image/gif" onChange={handleFileChange} style={{ display: "none" }} />
      </div>

      {error && <ErrBox>{error}</ErrBox>}

      {uploadedFile && !result && (
        <PrimaryBtn onClick={handleAnalyze} loading={analyzing} disabled={analyzing}>
          {analyzing ? "🤖 AI Reading Form..." : "🔍 Compare with Digital Entry"}
        </PrimaryBtn>
      )}

      {analyzing && (
        <div style={{ background: "#0a1a2a", borderRadius: 8, padding: "14px", marginTop: 12, fontSize: 13, color: "#5ec0ff", textAlign: "center" }}>
          <div style={{ fontSize: 20, marginBottom: 6 }}>🤖</div>
          Reading physical form and comparing with digital submission...
        </div>
      )}

      {result && (
        <div style={{ marginTop: 14 }}>
          {/* Overall verdict */}
          <div style={{ background: result.hasMismatch ? "#1a0808" : "#081a10", border: `1px solid ${result.hasMismatch ? "#cc3333" : "#1a5a2a"}`, borderRadius: 10, padding: "14px 16px", marginBottom: 14 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div>
                <div style={{ fontSize: 16, fontWeight: 800, color: result.hasMismatch ? "#ff6060" : "#4caf50" }}>
                  {result.hasMismatch ? "⚠️ MISMATCH DETECTED" : "✅ FIGURES MATCH"}
                </div>
                <div style={{ fontSize: 12, color: result.hasMismatch ? "#ff8080" : "#6ee7b7", marginTop: 3 }}>
                  {result.hasMismatch ? `${result.mismatches.length} discrepanc${result.mismatches.length === 1 ? "y" : "ies"} found` : "All figures match the physical form"}
                </div>
              </div>
              <div style={{ textAlign: "right" }}>
                <div style={{ fontSize: 11, color: "#3a5060" }}>Confidence</div>
                <div style={{ fontSize: 13, fontWeight: 700, color: result.confidence === "high" ? "#4caf50" : result.confidence === "medium" ? "#ffaa44" : "#ff6060" }}>
                  {result.confidence?.toUpperCase()}
                </div>
              </div>
            </div>
            {result.notes && <div style={{ fontSize: 12, color: "#5080a0", marginTop: 8, borderTop: "1px solid #1a2a3a", paddingTop: 8 }}>📝 {result.notes}</div>}
          </div>

          {/* Mismatches detail */}
          {result.hasMismatch && (
            <Card title="🚨 Mismatched Fields">
              <div style={{ display: "flex", gap: 6, padding: "0 0 6px", fontSize: 11, color: "#5878a0", fontWeight: 700 }}>
                <div style={{ flex: 2 }}>Field</div>
                <div style={{ flex: 1, textAlign: "right" }}>Digital</div>
                <div style={{ flex: 1, textAlign: "right" }}>Form</div>
                <div style={{ flex: 1, textAlign: "right" }}>Diff</div>
              </div>
              {result.mismatches.map((m, i) => (
                <div key={i} style={{ display: "flex", gap: 6, padding: "6px 0", borderBottom: "1px solid #0a1828", fontSize: 12 }}>
                  <div style={{ flex: 2, color: "#e63946", fontWeight: 600 }}>⚠ {m.field}</div>
                  <div style={{ flex: 1, textAlign: "right", color: "#ff8080" }}>{m.submitted}</div>
                  <div style={{ flex: 1, textAlign: "right", color: "#4caf50", fontWeight: 700 }}>{m.extracted}</div>
                  <div style={{ flex: 1, textAlign: "right", color: "#ffaa44" }}>{m.diff > 0 ? "+" : ""}{m.diff}</div>
                </div>
              ))}
              <div style={{ fontSize: 12, color: "#5080a0", marginTop: 10, lineHeight: 1.5 }}>
                Raise a correction request or notify the Ward Coordinator if figures from the physical form differ from digital entry.
              </div>
            </Card>
          )}

          {/* All extracted figures */}
          <Card title="📊 Figures Extracted from Physical Form">
            {[
              ["Registered Voters", result.extracted?.registered],
              ["Votes Cast", result.extracted?.cast],
              ["Rejected Ballots", result.extracted?.rejected],
              ["Disputed Ballots", result.extracted?.disputed],
            ].map(([label, val]) => (
              <RRow key={label} label={label} value={val !== null && val !== undefined ? val.toLocaleString() : "—"} />
            ))}
            <div style={{ borderTop: "1px solid #1a2040", paddingTop: 8, marginTop: 4 }}>
              {CANDIDATES.map((c) => {
                const val = result.extracted?.candidates?.[String(c.id)];
                return <RRow key={c.id} label={c.name} value={val !== null && val !== undefined ? val.toLocaleString() : "—"} />;
              })}
            </div>
          </Card>

          <div style={{ fontSize: 11, color: "#3a5060", textAlign: "center", marginTop: 8 }}>
            Verified {new Date(result.verifiedAt).toLocaleString("en-KE")} · Image quality: {result.imageQuality}
          </div>

          {uploadedFile && (
            <button onClick={() => { setResult(null); setUploadedFile(null); setPreviewUrl(null); }} style={{ width: "100%", background: "none", border: "1px solid #1a3050", color: "#5080a0", borderRadius: 8, padding: "10px", fontSize: 13, cursor: "pointer", marginTop: 8 }}>
              Upload a different form image
            </button>
          )}
        </div>
      )}
    </Card>
  );
}

// AGENT APP

          </div>

            { key: "results", label: "📊 All Stations" },
            { key: "profile", label: "👤 Profile" }
          ].map((n) => (
            <button key={n.key} onClick={() => setView(n.key)} style={{ ...S.navBtn, ...(view === n.key ? S.navBtnActive : {}) }}>{n.label}</button>
          ))}
        </div>
        <div style={S.content}>
          {view === "form" && <ResultsForm agent={agent} station={station} existing={myResult} pendingEdit={pendingEdit} editRequests={myEditRequests} onSubmit={onSubmit} onRequestEdit={onRequestEdit} />}
          {view === "verify" && <AIVerificationPanel station={station} submittedData={myResult} existingVerification={myVerification} onSaveVerification={onSaveVerification} />}
          {view === "results" && <AllResultsView results={results} currentStationId={agent.stationId} />}
          {view === "profile" && <AgentProfile agent={agent} station={station} />}
        </div>
      </div>
    </div>
  );
}

function ResultsForm({ agent, station, existing, pendingEdit, editRequests, onSubmit, onRequestEdit }) {
  const [votes, setVotes] = useState(existing?.votes || Object.fromEntries(CANDIDATES.map((c) => [c.id, ""])));
  const [registered, setRegistered] = useState(existing?.registered || (station?.registeredVoters ? String(station.registeredVoters) : ""));
  const [cast, setCast] = useState(existing?.cast || "");
  const [rejected, setRejected] = useState(existing?.rejected || "");
  const [disputed, setDisputed] = useState(existing?.disputed || "");
  const [step, setStep] = useState(existing ? "done" : 1);
  const [errors, setErrors] = useState({});
  const [editMode, setEditMode] = useState(false);
  const [eVotes, setEVotes] = useState(Object.fromEntries(CANDIDATES.map((c) => [c.id, ""])));
  const [eRegistered, setERegistered] = useState("");
  const [eCast, setECast] = useState("");
  const [eRejected, setERejected] = useState("");
  const [eDisputed, setEDisputed] = useState("");
  const [eReason, setEReason] = useState("");
  const [eErrors, setEErrors] = useState({});

  // ── Location state ─────────────────────────────────────────────────────────
  const [geoStatus, setGeoStatus] = useState("idle"); // idle | checking | allowed | denied | outside | error
  const [geoResult, setGeoResult] = useState(null);
  const [geoError, setGeoError] = useState("");

  useEffect(() => {
    // Auto-check location on mount
    checkLocation();
  }, []);

  function checkLocation() {
    setGeoStatus("checking");
    if (!navigator.geolocation) {
      setGeoStatus("error");
      setGeoError("GPS not supported on this device.");
      return;
    }
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        const { latitude, longitude } = pos.coords;
        const result = checkUploadLocation(latitude, longitude, station);
        setGeoResult(result);
        setGeoStatus(result.isWithin ? "allowed" : "outside");
      },
      (err) => {
        if (err.code === 1) { setGeoStatus("denied"); setGeoError("Location access denied. Please enable GPS to submit results."); }
        else { setGeoStatus("error"); setGeoError("Could not get your location. Please try again."); }
      },
      { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
    );
  }

  const totalVotes = Object.values(votes).reduce((s, v) => s + (parseInt(v) || 0), 0);
  const validVotes = (parseInt(cast) || 0) - (parseInt(rejected) || 0) - (parseInt(disputed) || 0);

  function validate() {
    const e = {};
    if (!registered || parseInt(registered) <= 0) e.registered = "Required";
    if (!cast || parseInt(cast) <= 0) e.cast = "Required";
    if (parseInt(cast) > parseInt(registered)) { e.cast = "❌ ALERT: Votes cast (" + cast + ") exceeds registered voters (" + registered + ")! This is not allowed."; alert("⛔ VALIDATION ERROR\n\nTotal Cast Votes (" + cast + ") cannot exceed Registered Voters (" + registered + ").\n\nPlease check and correct the figures immediately."); }
    CANDIDATES.forEach((c) => { if (votes[c.id] === "" || isNaN(parseInt(votes[c.id]))) e[`v${c.id}`] = "Required"; });
    if (!e.cast && totalVotes !== validVotes) e.mismatch = `Candidate totals (${totalVotes}) must equal valid votes (${validVotes})`;
    setErrors(e); return Object.keys(e).length === 0;
  }

  function startEdit() {
    setEVotes(existing.votes); setERegistered(existing.registered); setECast(existing.cast);
    setERejected(existing.rejected || ""); setEDisputed(existing.disputed || ""); setEReason(""); setEErrors({});
    setEditMode(true);
  }

  function validateEdit() {
    const e = {};
    const eTotal = Object.values(eVotes).reduce((s, v) => s + (parseInt(v) || 0), 0);
    const eValid = (parseInt(eCast) || 0) - (parseInt(eRejected) || 0) - (parseInt(eDisputed) || 0);
    if (!eRegistered || parseInt(eRegistered) <= 0) e.registered = "Required";
    if (!eCast || parseInt(eCast) <= 0) e.cast = "Required";
    if (parseInt(eCast) > parseInt(eRegistered)) { e.cast = "❌ ALERT: Votes cast exceeds registered voters!"; alert("⛔ VALIDATION ERROR\n\nTotal Cast Votes (" + eCast + ") cannot exceed Registered Voters (" + eRegistered + ").\n\nPlease check and correct the figures immediately."); }
    CANDIDATES.forEach((c) => { if (eVotes[c.id] === "" || isNaN(parseInt(eVotes[c.id]))) e[`v${c.id}`] = "Required"; });
    if (!e.cast && eTotal !== eValid) e.mismatch = `Candidate totals (${eTotal}) must equal valid votes (${eValid})`;
    if (!eReason.trim()) e.reason = "Please explain the reason for this correction";
    setEErrors(e); return Object.keys(e).length === 0;
  }

  function submitEditRequest() {
    if (!validateEdit()) return;
    onRequestEdit(station.id, { votes: eVotes, registered: eRegistered, cast: eCast, rejected: eRejected, disputed: eDisputed, agentId: agent.id, agentName: agent.name }, eReason.trim());
    setEditMode(false);
  }

  // ── Location gate — show before form ───────────────────────────────────────
  if (!existing && (geoStatus === "idle" || geoStatus === "checking")) {
    return (
      <div style={{ padding: "30px 16px", textAlign: "center" }}>
        <div style={{ fontSize: 48, marginBottom: 16 }}>📡</div>
        <div style={{ fontSize: 16, fontWeight: 700, color: "#5ec0ff", marginBottom: 8 }}>Verifying Your Location…</div>
        <div style={{ fontSize: 13, color: "#4a7090", marginBottom: 20 }}>Your GPS location must be confirmed before you can submit results.</div>
        <div style={{ width: 40, height: 40, border: "4px solid #1a3a5a", borderTopColor: "#5ec0ff", borderRadius: "50%", margin: "0 auto", animation: "spin 1s linear infinite" }}/>
      </div>
    );
  }

  if (!existing && geoStatus === "denied") {
    return (
      <div style={{ padding: "24px 16px" }}>
        <div style={{ background: "#1a0808", border: "2px solid #cc3333", borderRadius: 12, padding: "20px 16px", textAlign: "center" }}>
          <div style={{ fontSize: 40, marginBottom: 12 }}>🔒</div>
          <div style={{ fontSize: 16, fontWeight: 800, color: "#ff4444", marginBottom: 8 }}>Location Access Required</div>
          <div style={{ fontSize: 13, color: "#cc8080", marginBottom: 16, lineHeight: 1.6 }}>
            You must enable GPS / Location on your device to submit election results.<br/>
            This is required by IEBC to verify you are at your assigned polling station.
          </div>
          <div style={{ background: "#0a0808", borderRadius: 8, padding: "12px", fontSize: 12, color: "#aa6060", marginBottom: 16, textAlign: "left" }}>
            <strong style={{ color: "#ff8080" }}>How to enable:</strong><br/>
            📱 Android: Settings → Location → Turn ON<br/>
            🍎 iPhone: Settings → Privacy → Location Services → ON<br/>
            Then refresh the browser and try again.
          </div>
          <button onClick={checkLocation} style={{ background: "#0a3a18", color: "#4caf50", border: "2px solid #2a6a40", borderRadius: 8, padding: "12px 24px", fontSize: 14, fontWeight: 700, cursor: "pointer" }}>🔄 Try Again</button>
        </div>
      </div>
    );
  }

  if (!existing && geoStatus === "outside") {
    const dm = geoResult?.distStation;
    const dt = geoResult?.distTally;
    return (
      <div style={{ padding: "24px 16px" }}>
        <div style={{ background: "#1a0a04", border: "2px solid #cc6600", borderRadius: 12, padding: "20px 16px", textAlign: "center" }}>
          <div style={{ fontSize: 40, marginBottom: 12 }}>⚠️</div>
          <div style={{ fontSize: 16, fontWeight: 800, color: "#ff8800", marginBottom: 8 }}>Location Outside Authorised Zone</div>
          <div style={{ fontSize: 13, color: "#cc9060", marginBottom: 16, lineHeight: 1.6 }}>
            You are not within 1km of your polling station or the Constituency Tally Centre.<br/>
            You must be physically present at your station or the tally centre to submit.
          </div>
          <div style={{ background: "#0a0808", borderRadius: 8, padding: "12px", fontSize: 12, textAlign: "left", marginBottom: 16 }}>
            <div style={{ color: "#ff8040", marginBottom: 4 }}>📍 Your polling station: <strong style={{ color: "#ffaa60" }}>{station?.name}</strong></div>
            {dm !== null && <div style={{ color: "#886040" }}>Distance from station: <strong style={{ color: dm > 1000 ? "#ff6060" : "#88cc88" }}>{dm >= 1000 ? (dm/1000).toFixed(2)+"km" : dm+"m"}</strong></div>}
            {dt !== null && <div style={{ color: "#886040", marginTop: 4 }}>Distance from Tally Centre: <strong style={{ color: dt > 1000 ? "#ff6060" : "#88cc88" }}>{dt >= 1000 ? (dt/1000).toFixed(2)+"km" : dt+"m"}</strong></div>}
            <div style={{ color: "#666050", marginTop: 6, fontSize: 11 }}>Tally Centre: {TALLY_CENTRE?.name}</div>
          </div>
          <button onClick={checkLocation} style={{ background: "#0a3a18", color: "#4caf50", border: "2px solid #2a6a40", borderRadius: 8, padding: "12px 24px", fontSize: 14, fontWeight: 700, cursor: "pointer" }}>🔄 Recheck Location</button>
        </div>
      </div>
    );
  }

  if (step === "done") {
    const eTotal = Object.values(existing?.votes || votes).reduce((s, v) => s + (parseInt(v) || 0), 0);
    return (
      <div>
        <div style={{ background: "#0a2a18", border: "1px solid #2a6a40", borderRadius: 10, padding: "14px 16px", fontSize: 14, color: "#70e090", marginBottom: 16 }}>
          ✅ Results submitted for {station?.code}
          <div style={{ fontSize: 12, marginTop: 4, color: "#80e0a0" }}>Submitted at {new Date(existing?.submittedAt || Date.now()).toLocaleString("en-KE")}</div>
          {existing?.correctedAt && <div style={{ fontSize: 12, marginTop: 2, color: "#80e0a0" }}>Last corrected {new Date(existing.correctedAt).toLocaleString("en-KE")}</div>}
        </div>

        {pendingEdit && (
          <div style={{ background: "#1a1500", border: "1px solid #6a5a1a", borderRadius: 10, padding: "12px 16px", fontSize: 13, color: "#ffd166", marginBottom: 16 }}>
            ⏳ A correction request is pending Ward Coordinator approval ({new Date(pendingEdit.requestedAt).toLocaleString("en-KE")}).
          </div>
        )}

        {!editMode ? (
          <>
            <Card title="Submitted Results">
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #0a1828"}}><span style={{fontSize:13,color:"#5080a0"}}>Registered Voters</span><strong style={{background:"#ffe000",color:"#cc0000",fontWeight:900,padding:"2px 8px",borderRadius:4,border:"1px solid #cc0000"}}>🔒 {(existing?.registered ?? registered) || "—"}</strong></div>
              <RRow label="Votes Cast" value={existing?.cast ?? cast} />
              <RRow label="Rejected" value={existing?.rejected || rejected || "0"} />
              {CANDIDATES.map((c) => <RRow key={c.id} label={c.name} value={(existing?.votes || votes)[c.id] || "0"} pct={eTotal > 0 ? (((existing?.votes || votes)[c.id] / eTotal) * 100).toFixed(1) + "%" : "—"} />)}
              <RRow label="Total" value={eTotal} hi />
            </Card>
            <PrimaryBtn onClick={startEdit} disabled={!!pendingEdit}>
              {pendingEdit ? "Correction Pending Approval" : "✏️ Request Edit / Correction"}
            </PrimaryBtn>
            <div style={{ fontSize: 12, color: "#3a5060", textAlign: "center", marginTop: 8 }}>Any edit must be approved by your Ward Coordinator.</div>
          </>
        ) : (
          <>
            <Card title="✏️ Request a Correction">
              <div style={{ fontSize: 13, color: "#5080a0", marginBottom: 10 }}>Update the figures and explain why a correction is needed.</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                <FormField label="Registered Voters" error={eErrors.registered}>
                <input type="number" min="0" 
                  style={{...S.input, background:"#ffe000", color:"#cc0000", fontWeight:900, border:"2px solid #cc0000", pointerEvents:"none"}} 
                  value={eRegistered} 
                  readOnly 
                />
                <div style={{fontSize:11,color:"#ffaa00",marginTop:3}}>🔒 Locked — auto-populated from IEBC register</div>
              </FormField>
                <FormField label="Total Votes Cast *" error={eErrors.cast}><input type="number" min="0" style={S.input} value={eCast} onChange={(e) => setECast(e.target.value)} /></FormField>
                <FormField label="Rejected Ballots"><input type="number" min="0" style={S.input} value={eRejected} onChange={(e) => setERejected(e.target.value)} /></FormField>
                <FormField label="Disputed Ballots"><input type="number" min="0" style={S.input} value={eDisputed} onChange={(e) => setEDisputed(e.target.value)} /></FormField>
              </div>
            </Card>
            <Card title="Corrected Candidate Votes">
              {eErrors.mismatch && <ErrBox>{eErrors.mismatch}</ErrBox>}
              {CANDIDATES.map((c, i) => (
                <div key={c.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "9px 0", borderBottom: "1px solid #0e2030" }}>
                  <div style={{ width: 38, height: 38, borderRadius: "50%", background: PARTY_COLORS[c.party] || CANDIDATE_COLORS[i], display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22, flexShrink: 0, border: `2px solid ${PARTY_COLORS[c.party] || CANDIDATE_COLORS[i]}` }}>{c.portrait || c.id}</div>
                  <div style={{ flex: 1 }}><div style={{ fontSize: 14, fontWeight: 600, color: "#c8dcf0" }}>{c.name}</div><div style={{ fontSize: 11, color: PARTY_COLORS[c.party] || "#4a6880" }}>{PARTY_SYMBOLS[c.party] || ""} {c.party}</div></div>
                  <input type="number" min="0" style={{ ...S.input, width: 88, textAlign: "right", padding: "7px 10px", border: `1px solid ${eErrors[`v${c.id}`] ? "#cc4444" : "#1e3a5f"}` }} value={eVotes[c.id]} onChange={(e) => setEVotes((v) => ({ ...v, [c.id]: e.target.value }))} />
                </div>
              ))}
            </Card>
            <Card title="Reason for Correction *">
              {eErrors.reason && <ErrBox>{eErrors.reason}</ErrBox>}
              <textarea style={{ ...S.input, minHeight: 70, resize: "vertical" }} value={eReason} onChange={(e) => setEReason(e.target.value)} placeholder="e.g. Transposition error on candidate 3." />
            </Card>
            <PrimaryBtn onClick={submitEditRequest}>Send Correction for Approval</PrimaryBtn>
            <button onClick={() => setEditMode(false)} style={{ width: "100%", background: "none", border: "1px solid #1a3050", color: "#5080a0", borderRadius: 8, padding: "10px", fontSize: 13, cursor: "pointer", marginTop: 8 }}>Cancel</button>
          </>
        )}

        {editRequests && editRequests.length > 0 && (
          <Card title="📜 Correction Request History">
            {editRequests.slice().sort((a, b) => new Date(b.requestedAt) - new Date(a.requestedAt)).map((r) => (
              <div key={r.id} style={{ padding: "8px 0", borderBottom: "1px solid #0a1828" }}>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12 }}>
                  <span style={{ color: "#90b0d0" }}>{new Date(r.requestedAt).toLocaleString("en-KE")}</span>
                  <span style={{ fontWeight: 700, color: r.status === "approved" ? "#4caf50" : r.status === "rejected" ? "#ff6060" : "#ffaa44" }}>
                    {r.status === "approved" ? "✅ Approved" : r.status === "rejected" ? "❌ Rejected" : "⏳ Pending"}
                  </span>
                </div>
                {r.reason && <div style={{ fontSize: 12, color: "#5878a0", marginTop: 2 }}>{r.reason}</div>}
              </div>
            ))}
          </Card>
        )}
      </div>
    );
  }

  return (
    <div>
      <Card title={`📍 ${station?.code} · ${station?.label}`}>
        <div style={{ fontSize: 13, color: "#5080a0" }}>Your assigned station — only you can submit here.</div>
      </Card>
      <Card title="Ballot Summary">
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
          <FormField label="Registered Voters" error={errors.registered}>
              <div style={{position:"relative"}}>
                <input type="number" min="0" 
                  style={{...S.input, background:"#ffe000", color:"#cc0000", fontWeight:900, fontSize:16, border:"2px solid #cc0000", pointerEvents:"none", userSelect:"none"}} 
                  value={registered} 
                  readOnly 
                  placeholder="Auto-populated" 
                />
                <div style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",fontSize:11,color:"#cc0000",fontWeight:700}}>🔒 LOCKED</div>
              </div>
              <div style={{fontSize:11,color:"#ffaa00",marginTop:3}}>⚡ Auto-populated from IEBC register</div>
            </FormField>
          <FormField label="Total Votes Cast *" error={errors.cast}><input type="number" min="0" style={S.input} value={cast} onChange={(e) => setCast(e.target.value)} placeholder="0" /></FormField>
          <FormField label="Rejected Ballots"><input type="number" min="0" style={S.input} value={rejected} onChange={(e) => setRejected(e.target.value)} placeholder="0" /></FormField>
          <FormField label="Disputed Ballots"><input type="number" min="0" style={S.input} value={disputed} onChange={(e) => setDisputed(e.target.value)} placeholder="0" /></FormField>
        </div>
        {cast && <div style={{ marginTop: 10, padding: "8px 12px", background: "#0a2010", borderRadius: 6, fontSize: 13, color: "#70d090" }}>Valid votes to allocate: <strong>{validVotes}</strong></div>}
      </Card>
      <Card title="Candidate Votes">
        {errors.mismatch && <ErrBox>{errors.mismatch}</ErrBox>}
        {CANDIDATES.map((c, i) => (
          <div key={c.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "9px 0", borderBottom: "1px solid #0e2030" }}>
            <div style={{ width: 38, height: 38, borderRadius: "50%", background: PARTY_COLORS[c.party] || CANDIDATE_COLORS[i], display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22, flexShrink: 0, border: `2px solid ${PARTY_COLORS[c.party] || CANDIDATE_COLORS[i]}` }}>{c.portrait || c.id}</div>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 14, fontWeight: 600, color: "#c8dcf0" }}>{c.name}</div>
              <div style={{ fontSize: 12, color: PARTY_COLORS[c.party] || "#4a6880", display: "flex", alignItems: "center", gap: 4 }}><span>{PARTY_SYMBOLS[c.party] || ""}</span><span>{c.party}</span></div>
            </div>
            <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end" }}>
              <input type="number" min="0" style={{ ...S.input, width: 88, textAlign: "right", padding: "7px 10px", border: `1px solid ${errors[`v${c.id}`] ? "#cc4444" : "#1e3a5f"}` }} value={votes[c.id]} onChange={(e) => setVotes((v) => ({ ...v, [c.id]: e.target.value }))} placeholder="0" />
              {errors[`v${c.id}`] && <span style={{ fontSize: 11, color: "#ff6060" }}>Required</span>}
            </div>
          </div>
        ))}
        <div style={{ display: "flex", justifyContent: "space-between", padding: "10px 0 0", fontSize: 14 }}>
          <span style={{ color: "#5080a0" }}>Running total</span>
          <strong style={{ color: totalVotes === validVotes && cast ? "#4caf50" : "#ffaa44" }}>{totalVotes}</strong>
        </div>
      </Card>
      <PrimaryBtn onClick={() => { 
          if (validate()) { 
            const totalCandidateVotes = CANDIDATES.reduce((s,c) => s + (parseInt(votes[c.id])||0), 0);
            const validVotes = parseInt(cast) - (parseInt(rejected)||0) - (parseInt(disputed)||0);
            if (totalCandidateVotes !== validVotes) {
              alert("⛔ VALIDATION ERROR\n\nSum of all candidate votes (" + totalCandidateVotes + ") must equal Valid Votes (Cast - Rejected - Disputed = " + validVotes + ").\n\nDifference: " + (totalCandidateVotes - validVotes) + "\n\nPlease verify your figures.");
              return;
            }
            onSubmit(station.id, { votes, registered, cast, rejected, disputed, agentId: agent.id, agentName: agent.name, geo: geoResult || null }); setStep("done"); 
          } }}>
        Submit Final Results 🗳️
      </PrimaryBtn>
      <div style={{ fontSize: 12, color: "#3a5060", textAlign: "center", marginTop: 8 }}>Submission is final. Any later correction requires Ward Coordinator approval.</div>
    </div>
  );
}

function AllResultsView({ results, currentStationId }) {
  const [search, setSearch] = useState("");
  const submitted = POLLING_STATIONS.filter((s) => results[s.id]);
  const grandTotals = CANDIDATES.map((c) => ({ ...c, total: Object.values(results).reduce((sum, r) => sum + (parseInt(r.votes?.[c.id]) || 0), 0) }));
  const grandTotal = grandTotals.reduce((s, c) => s + c.total, 0);
  const filtered = POLLING_STATIONS.filter((s) => s.name.toLowerCase().includes(search.toLowerCase()) || s.code.toLowerCase().includes(search.toLowerCase()));

  return (
    <div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 14 }}>
        <StatBox label="Submitted" value={submitted.length} color="#4caf50" />
        <StatBox label="Pending" value={130 - submitted.length} color="#ff9800" />
        <StatBox label="Total" value={130} color="#5090c0" />
      </div>
      {grandTotal > 0 && (
        <Card title="📊 Running Totals">
          {grandTotals.sort((a, b) => a.name.localeCompare(b.name)).map((c, i) => (
            <div key={c.id} style={{ marginBottom: 10 }}>
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, marginBottom: 3 }}>
                <span style={{ color: PARTY_COLORS[c.party] || "#c0d8f0", display: "flex", alignItems: "center", gap: 4 }}><span>{c.portrait || ""}</span><span>{c.name}</span><span style={{ fontSize: 10 }}>{PARTY_SYMBOLS[c.party] || ""}</span></span>
                <strong style={{ color: "#fff" }}>{c.total.toLocaleString()} <span style={{ color: "#5080a0", fontWeight: 400 }}>({grandTotal > 0 ? ((c.total / grandTotal) * 100).toFixed(1) : 0}%)</span></strong>
              </div>
              <div style={{ height: 7, background: "#0a1828", borderRadius: 4 }}>
                <div style={{ height: "100%", width: `${grandTotal > 0 ? (c.total / grandTotal) * 100 : 0}%`, background: PARTY_COLORS[c.party] || CANDIDATE_COLORS[CANDIDATES.findIndex(x => x.id === c.id)], borderRadius: 4, transition: "width 0.5s" }} />
              </div>
            </div>
          ))}
        </Card>
      )}
      <Card title="All Polling Stations">
        <input style={{ ...S.input, marginBottom: 12 }} placeholder="🔍 Search station..." value={search} onChange={(e) => setSearch(e.target.value)} />
        <div style={{ maxHeight: 380, overflowY: "auto" }}>
          {filtered.map((s) => {
            const r = results[s.id]; const isMine = s.id === currentStationId;
            return (
              <div key={s.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "9px 12px", marginBottom: 4, borderRadius: 8, background: isMine ? "#0a2a18" : "#080f1c", border: `1px solid ${isMine ? "#1a6a38" : r ? "#1a3a1a" : "#0e1e30"}` }}>
                <div>

// WARD COORDINATOR APP
// ═══════════════════════════════════════════════════════════════════════════════
function CoordinatorApp({ coordinator, results, editRequests, verifications, onResolveEdit, onLogout }) {
  const [view, setView] = useState("requests");
  const wardStations = POLLING_STATIONS.filter((s) => s.ward === coordinator.ward);
  const wardSubmitted = wardStations.filter((s) => results[s.id]);
  const myRequests = Object.values(editRequests || {}).filter((r) => r.ward === coordinator.ward);
  const pending = myRequests.filter((r) => r.status === "pending").sort((a, b) => new Date(a.requestedAt) - new Date(b.requestedAt));
  const resolved = myRequests.filter((r) => r.status !== "pending").sort((a, b) => new Date(b.resolvedAt) - new Date(a.resolvedAt));
  const mismatchCount = wardStations.filter(s => verifications[s.id]?.hasMismatch).length;

  return (
    <div style={S.page}>
      <div style={S.appWrap}>
        <div style={{ background: "#0a1a2a", borderBottom: "2px solid #1a5a8a", padding: "14px 16px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div>
            <div style={{ fontSize: 11, color: "#5ec0ff", letterSpacing: 1, textTransform: "uppercase" }}>Ward Coordinator</div>
            <div style={{ fontSize: 15, fontWeight: 700, color: "#fff" }}>{coordinator.name}</div>
            <div style={{ fontSize: 12, color: "#3a6a90" }}>{coordinator.ward} · {wardSubmitted.length}/{wardStations.length} stations reported</div>
          </div>
          <button onClick={onLogout} style={{ background: "#0a1828", color: "#5ec0ff", border: "1px solid #1a5a8a", borderRadius: 6, padding: "7px 14px", fontSize: 12, cursor: "pointer", fontWeight: 600 }}>Sign Out</button>
        </div>
        <div style={S.nav}>
          {[
            { key: "requests", label: `✏️ Corrections${pending.length ? ` (${pending.length})` : ""}` },
            { key: "turnout", label: "📊 Turnout" },
            { key: "verify", label: `🤖 AI Flags${mismatchCount ? ` (${mismatchCount})` : ""}` },
            { key: "export", label: "⬇️ Download" },
          ].map((n) => (
            <button key={n.key} onClick={() => setView(n.key)} style={{ ...S.navBtn, ...(view === n.key ? { color: "#5ec0ff", borderBottomColor: "#1a5a8a" } : {}) }}>{n.label}</button>
          ))}
        </div>
        <div style={S.content}>
          {view === "requests" && (
            <div>
              <Card title="⏳ Pending Correction Requests">
                {pending.length === 0 ? (
                  <div style={{ textAlign: "center", padding: "20px 0", color: "#3a4060" }}>No pending correction requests.</div>
                ) : pending.map((r) => {
                  const station = POLLING_STATIONS.find((s) => s.id === r.stationId);
                  return <EditRequestCard key={r.id} req={r} station={station} onResolve={(approve) => onResolveEdit(r.id, approve, coordinator.name)} />;
                })}
              </Card>
              {resolved.length > 0 && (
                <Card title="📜 Resolved Requests">
                  {resolved.map((r) => {
                    const station = POLLING_STATIONS.find((s) => s.id === r.stationId);
                    return (
                      <div key={r.id} style={{ padding: "8px 0", borderBottom: "1px solid #0a1828" }}>
                        <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12 }}>
                          <span style={{ color: "#90b0d0" }}>{station?.code} · {station?.label}</span>
                          <span style={{ fontWeight: 700, color: r.status === "approved" ? "#4caf50" : "#ff6060" }}>{r.status === "approved" ? "✅ Approved" : "❌ Rejected"}</span>
                        </div>
                        <div style={{ fontSize: 11, color: "#3a5060", marginTop: 2 }}>{r.reason}</div>
                      </div>
                    );
                  })}
                </Card>
              )}
            </div>
          )}

          {view === "turnout" && <TurnoutDashboard results={results} scope={coordinator.ward} />}

          {view === "verify" && (() => {
            const wardVerifList = wardStations.map(s => verifications[s.id]).filter(Boolean);
            const wVerified = wardVerifList.length;
            const wMismatches = wardVerifList.filter(v => v.hasMismatch).length;
            const wMatched = wVerified - wMismatches;
            const wCorrected = Math.min(
              resolved.filter(r => r.status === "approved").length,
              wMismatches
            );
            const wTotal = wardStations.filter(s => results[s.id]).length;
            return (
              <div>
                <Card title="🤖 AI Form Verification — Ward Summary">
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 12 }}>
                    <StatBox label={`${wTotal} Submitted`} value={`${wVerified} Verified`} color="#5ec0ff"/>
                    <div style={{ background: "#1a0808", border: "2px solid #cc2222", borderRadius: 10, padding: "12px 10px", textAlign: "center" }}>
                      <div style={{ fontSize: 30, fontWeight: 900, color: "#ff3333", fontFamily: "Georgia, serif", letterSpacing: 2 }}>{wMismatches}</div>
                      <div style={{ fontSize: 11, color: "#cc6060", textTransform: "uppercase", letterSpacing: 1, marginTop: 3, fontStyle: "italic", fontWeight: 700 }}>⚠ Mismatch</div>
                    </div>
                    <StatBox label="Matched ✅" value={wMatched} color="#4caf50"/>
                    <StatBox label="Corrected 🔧" value={wCorrected} color="#f59e0b"/>
                  </div>
                </Card>
                {wVerified === 0 ? (
                  <Card title="🤖 AI Flags"><div style={{ textAlign: "center", padding: "20px 0", color: "#3a4060" }}>No forms verified in your ward yet.</div></Card>
                ) : wardStations.filter(s => verifications[s.id]).map(s => {
                  const v = verifications[s.id];
                  return (
                    <Card key={s.id} title={`${v.hasMismatch ? "⚠️" : "✅"} ${s.code} — ${s.label}`}>
                      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, marginBottom: 8 }}>
                        <span style={{ color: "#5878a0" }}>{new Date(v.verifiedAt).toLocaleString("en-KE")}</span>
                        <span style={{ fontWeight: 900, color: v.hasMismatch ? "#ff3333" : "#4caf50", fontStyle: v.hasMismatch ? "italic" : "normal", fontFamily: v.hasMismatch ? "Georgia, serif" : "inherit" }}>
                          {v.hasMismatch ? `⚠ MISMATCH (${v.mismatches.length})` : "✅ Matched"}
                        </span>
                      </div>
                      {v.hasMismatch && v.mismatches.map((m, i) => (
                        <div key={i} style={{ display: "flex", justifyContent: "space-between", fontSize: 12, padding: "4px 0", borderBottom: "1px solid #0a1828", color: "#ff8080" }}>
                          <span>{m.field}</span>
                          <span style={{ fontFamily: "monospace" }}>Digital: {m.submitted} | Form: {m.extracted} | Diff: {m.diff > 0 ? "+" : ""}{m.diff}</span>
                        </div>
                      ))}
                    </Card>
                  );
                })}
              </div>
            );
          })()}

          {view === "export" && (
            <Card title="⬇️ Download Results">
              <div style={{ fontSize: 13, color: "#5080a0", marginBottom: 14 }}>
                Download the official tally for {coordinator.ward}. AI verification status is included.
              </div>
              <PrimaryBtn onClick={() => exportWardCSV(coordinator.ward, results)}>
                📄 Download {coordinator.ward} Tally (CSV)
              </PrimaryBtn>
            </Card>
          )}
        </div>
      </div>
    </div>
  );
}

  );

    setPwError(""); setPwSuccess("");

    if (newPin.trim() !== confirmPin.trim()) { setPwError("New password and confirmation do not match."); return; }

    ADMIN.pin = newPin.trim();

// TURNOUT DASHBOARD
// ═══════════════════════════════════════════════════════════════════════════════
function TurnoutDashboard({ results, scope }) {
  const stations = scope ? POLLING_STATIONS.filter((s) => s.ward === scope) : POLLING_STATIONS;
  const submitted = stations.filter((s) => results[s.id]);
  const totals = submitted.reduce((acc, s) => {
    const r = results[s.id];
    acc.registered += parseInt(r.registered) || 0;
    acc.cast += parseInt(r.cast) || 0;
    acc.rejected += parseInt(r.rejected) || 0;
    acc.disputed += parseInt(r.disputed) || 0;
    return acc;
  }, { registered: 0, cast: 0, rejected: 0, disputed: 0 });

  const turnoutPct = totals.registered > 0 ? (totals.cast / totals.registered) * 100 : 0;
  const validVotes = totals.cast - totals.rejected - totals.disputed;
  const rejectionRate = totals.cast > 0 ? (totals.rejected / totals.cast) * 100 : 0;
  const wardTurnout = (scope ? [scope] : WARDS).map((ward) => {
    const wStations = POLLING_STATIONS.filter((s) => s.ward === ward);
    const wSubmitted = wStations.filter((s) => results[s.id]);
    const t = wSubmitted.reduce((acc, s) => { const r = results[s.id]; acc.registered += parseInt(r.registered) || 0; acc.cast += parseInt(r.cast) || 0; return acc; }, { registered: 0, cast: 0 });
    const pct = t.registered > 0 ? (t.cast / t.registered) * 100 : 0;
    return { ward, ...t, pct, reported: wSubmitted.length, total: wStations.length };
  });
  const maxPct = Math.max(100, ...wardTurnout.map((w) => w.pct));

  return (
    <div>
      <Card title={`📊 Turnout${scope ? ` — ${scope}` : " — Kangundo Constituency"}`}>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 14 }}>
          <div style={{ background: "linear-gradient(135deg,#06203a,#0a3a5a)", border: "1px solid #1a5a8a", borderRadius: 12, padding: "18px 14px", textAlign: "center" }}>
            <div style={{ fontSize: 38, fontWeight: 900, color: "#5ec0ff", lineHeight: 1 }}>{turnoutPct.toFixed(1)}%</div>
            <div style={{ fontSize: 13, color: "#90c8f0", marginTop: 6, fontWeight: 600 }}>Voter Turnout</div>
          </div>
          <div style={{ background: "linear-gradient(135deg,#052e16,#064e3b)", border: "1px solid #065f46", borderRadius: 12, padding: "18px 14px", textAlign: "center" }}>
            <div style={{ fontSize: 38, fontWeight: 900, color: "#4caf50", lineHeight: 1 }}>{validVotes.toLocaleString()}</div>
            <div style={{ fontSize: 13, color: "#6ee7b7", marginTop: 6, fontWeight: 600 }}>Valid Votes</div>
          </div>
        </div>
        <RRow label="Registered Voters (reported)" value={totals.registered.toLocaleString()} />
        <RRow label="Total Votes Cast" value={totals.cast.toLocaleString()} />
        <RRow label="Rejected Ballots" value={totals.rejected.toLocaleString()} />
        <RRow label="Disputed Ballots" value={totals.disputed.toLocaleString()} />
        <RRow label="Valid Votes" value={validVotes.toLocaleString()} hi />
        <RRow label="Stations Reported" value={`${submitted.length} / ${stations.length}`} />
      </Card>
      <Card title="🗳️ Turnout by Ward">
        {wardTurnout.map((w) => (
          <div key={w.ward} style={{ marginBottom: 14 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
              <span style={{ fontSize: 13, color: "#a0b8d0" }}>{w.ward}</span>
              <strong style={{ fontSize: 14, color: "#5ec0ff" }}>{w.pct.toFixed(1)}%</strong>
            </div>
            <div style={{ height: 10, background: "#0a1020", borderRadius: 5, overflow: "hidden" }}>
              <div style={{ height: "100%", width: `${Math.min(100, (w.pct / maxPct) * 100)}%`, background: "linear-gradient(90deg,#0a5a8a,#5ec0ff)", borderRadius: 5, transition: "width 0.5s" }} />
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: "#3a5060", marginTop: 3 }}>
              <span>{w.cast.toLocaleString()} cast of {w.registered.toLocaleString()} registered</span>
              <span>{w.reported}/{w.total} stations</span>
            </div>
          </div>
        ))}
      </Card>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// PIE CHART
// ═══════════════════════════════════════════════════════════════════════════════
function PieChart({ data, total }) {
  const [hovered, setHovered] = useState(null);
  const cx = 110, cy = 110, r = 90, innerR = 45;
  let cumAngle = -Math.PI / 2;
  const slices = data.map((c) => {
    const frac = total > 0 ? c.total / total : 0;
    const angle = frac * 2 * Math.PI;
    const startAngle = cumAngle;
    cumAngle += angle;
    const endAngle = cumAngle;
    const x1 = cx + r * Math.cos(startAngle), y1 = cy + r * Math.sin(startAngle);
    const x2 = cx + r * Math.cos(endAngle), y2 = cy + r * Math.sin(endAngle);
    const ix1 = cx + innerR * Math.cos(endAngle), iy1 = cy + innerR * Math.sin(endAngle);
    const ix2 = cx + innerR * Math.cos(startAngle), iy2 = cy + innerR * Math.sin(startAngle);
    const largeArc = angle > Math.PI ? 1 : 0;
    const midAngle = startAngle + angle / 2;
    const path = angle < 0.001 ? "" : `M ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2} L ${ix1} ${iy1} A ${innerR} ${innerR} 0 ${largeArc} 0 ${ix2} ${iy2} Z`;
    return { ...c, path, frac, midAngle };
  });
  const hov = hovered !== null ? data.find((c) => c.id === hovered) : null;

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "center", marginBottom: 8 }}>
        <svg width={220} height={220} viewBox="0 0 220 220">
          {slices.map((s) => (
            <path key={s.id} d={s.path} fill={s.color} opacity={hovered === null || hovered === s.id ? 1 : 0.35}
              stroke="#060e1a" strokeWidth={2}
              transform={hovered === s.id ? `translate(${Math.cos(s.midAngle) * 5} ${Math.sin(s.midAngle) * 5})` : ""}
              style={{ cursor: "pointer", transition: "opacity 0.2s" }}
              onMouseEnter={() => setHovered(s.id)} onMouseLeave={() => setHovered(null)} />
          ))}
          <text x={cx} y={cy - 8} textAnchor="middle" fill="#fff" fontSize="18" fontWeight="800">{hov ? hov.total.toLocaleString() : total.toLocaleString()}</text>
          <text x={cx} y={cy + 10} textAnchor="middle" fill="#5080a0" fontSize="10">{hov ? `${((hov.total / total) * 100).toFixed(1)}%` : "total votes"}</text>
        </svg>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "6px 12px" }}>
        {slices.map((s) => (
          <div key={s.id} onMouseEnter={() => setHovered(s.id)} onMouseLeave={() => setHovered(null)}
            style={{ display: "flex", alignItems: "center", gap: 7, padding: "5px 8px", borderRadius: 6, background: hovered === s.id ? "#0e1e35" : "transparent", cursor: "pointer" }}>
            <div style={{ width: 12, height: 12, borderRadius: 3, background: s.color, flexShrink: 0 }} />
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 11, color: "#90b0d0", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{s.name.split("—")[0].trim()}</div>
              <div style={{ fontSize: 11, fontWeight: 700, color: s.color }}>{s.total.toLocaleString()} <span style={{ color: "#3a5060", fontWeight: 400 }}>({(s.frac * 100).toFixed(1)}%)</span></div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

}
function PrimaryBtn({ onClick, children, loading, disabled }) {

  return (

// ═══════════════════════════════════════════════════════════════════════════════
// BOOTSTRAP — loads data.json, derives computed fields, then renders <App />
// ═══════════════════════════════════════════════════════════════════════════════
const LOADER_MIN_MS = 1500; // keep the splash visible at least this long
const bootStartedAt = Date.now();

function hideLoader() {
    if (window._clearMsgInterval) window._clearMsgInterval();
  const wait = Math.max(0, LOADER_MIN_MS - (Date.now() - bootStartedAt));
  setTimeout(() => {
    const loader = document.getElementById("loader");
    if (!loader) return;
    loader.classList.add("hidden");
    setTimeout(() => loader.remove(), 400);
  }, wait);
}

async function bootstrap() {
  const res = await fetch("data.json");
  if (!res.ok) throw new Error(`Could not load data.json (HTTP ${res.status})`);
  const data = await res.json();

  CANDIDATES = data.CANDIDATES;
  CANDIDATE_COLORS = data.CANDIDATE_COLORS;
  PARTY_COLORS = data.PARTY_COLORS || {};
  PARTY_SYMBOLS = data.PARTY_SYMBOLS || {};
  POLLING_STATIONS = data.POLLING_STATIONS;
  WARDS = data.WARDS;
  ADMIN = data.ADMIN;
  WARD_COORDINATORS = data.WARD_COORDINATORS;
  TALLY_CENTRE = data.TALLY_CENTRE || { name: "Kangundo DEB Integrated Primary School", lat: -1.2978, lng: 37.3474, radius_km: 1.0 };
  GEO_CONFIG = data.GEO_CONFIG || { station_radius_km: 1.0, tally_centre_radius_km: 1.0, enforcement: true };

  // Derive per-station stream number / label
  const CENTRE_STREAM_COUNTS = {};
  POLLING_STATIONS.forEach((s) => {
    const centre = s.code.slice(0, 13);
    CENTRE_STREAM_COUNTS[centre] = (CENTRE_STREAM_COUNTS[centre] || 0) + 1;
  });
  POLLING_STATIONS.forEach((s) => {
    const centre = s.code.slice(0, 13);
    s.stream = parseInt(s.code.slice(-2), 10);
    s.streamCount = CENTRE_STREAM_COUNTS[centre];
    s.label = s.streamCount > 1 ? `${s.name} — Stream ${s.stream}` : s.name;
  });

  // Default agent credentials (one per polling station)
  const defaultAgents = Array.from({ length: 130 }, (_, i) => {
    const id = `A${String(i + 1).padStart(3, "0")}`;
    const station = POLLING_STATIONS[i];
    return { id, name: `Agent for ${station.code}`, pin: String(2001 + i), stationId: station.id, phone: `070100${String(i + 1).padStart(4, "0")}` };
  });
  AGENTS = defaultAgents;

  // ── Load overrides from Supabase (with 5s timeout so app never hangs) ──────
  const withTimeout = (promise, ms) => Promise.race([
    promise,
    new Promise((_, reject) => setTimeout(() => reject(new Error("timeout")), ms))
  ]);

  try {
    const sbPin = await withTimeout(FB.getAdminPin(), 5000);
    if (sbPin) ADMIN.pin = sbPin;
  } catch(e) { console.warn("Supabase PIN load skipped:", e.message); }

  try {
    const fbAgents = await withTimeout(FB.getAgents(), 5000);
    if (fbAgents && Array.isArray(fbAgents) && fbAgents.length > 0) AGENTS = fbAgents;
  } catch(e) { console.warn("Supabase agents load skipped:", e.message); }

  try {
    const fbCoords = await withTimeout(FB.getCoordinators(), 5000);
    if (fbCoords && Array.isArray(fbCoords) && fbCoords.length > 0) WARD_COORDINATORS = fbCoords;
  } catch(e) { console.warn("Supabase coordinators load skipped:", e.message); }

  // db shim — kept for any remaining legacy references
  db = { results: {}, editRequests: {}, verifications: {} };

  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(<App />);
  hideLoader();
}

bootstrap().catch((err) => {
  document.getElementById("root").innerHTML =
    `<div class="boot-msg" style="color:#ff8080;text-align:center;padding:20px;">Failed to load data.json: ${err.message}<br/><br/>Make sure index.html and data.json are in the same folder and served over http(s) (not opened directly as a file).</div>`;
  hideLoader();
});

</script>
